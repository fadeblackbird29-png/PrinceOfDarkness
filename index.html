<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Prince of Darkness - Manga Reader</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            width: 100%;
            background-color: #1a1a1a;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #333;
            cursor: pointer;
        }
        
        .chapter-menu {
            max-width: 600px;
            width: 90%;
            margin: 40px 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .chapter-link {
            background-color: #1a1a1a;
            color: #fff;
            padding: 20px;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid #333;
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chapter-link:hover {
            background-color: #ff4500;
            border-color: #ff4500;
            transform: translateY(-2px);
        }

        .hidden {
            display: none !important;
        }
        .navigation {
            margin: 20px 0;
        }
        .btn {
            background-color: #ff4500;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 0 10px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
        }
        .btn:hover {
            background-color: #e03e00;
        }
        .manga-container {
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0px;
        }
        .manga-page {
            width: 100%;
            height: auto;
            display: block;
        }
        
        /* Dark Theme Comments Section Layout */
        .comments-section {
            max-width: 800px;
            width: 90%;
            margin: 40px auto;
            background-color: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        footer {
            margin: 40px 0;
            text-align: center;
            color: #666;
        }
    </style>
</head>

    <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>

    <script>
        function openChapter(chapterId, chapterTitle) {
            document.getElementById('menu-view').classList.add('hidden');
            document.getElementById('reader-view').classList.remove('hidden');
            
            const contents = document.querySelectorAll('.chapter-content');
            contents.forEach(content => content.classList.add('hidden'));
            
            document.getElementById(chapterId).classList.remove('hidden');
            document.getElementById('current-view-title').innerText = chapterTitle;
            
            window.scrollTo({top: 0, behavior: 'smooth'});

            // Dynamically reload the comments box specifically for this chapter
            if (window.CUSDIS) {
                window.CUSDIS.renderTo(document.getElementById('cusdis_thread'), {
                    pageId: chapterId,
                    pageUrl: window.location.href + '#' + chapterId,
                    pageTitle: chapterTitle
                });
            }
        }

        function showMenu() {
            document.getElementById('reader-view').classList.add('hidden');
            document.getElementById('menu-view').classList.remove('hidden');
            document.getElementById('current-view-title').innerText = "Chapter Selection";
            
            // Switch comments thread back to main page context
            if (window.CUSDIS) {
                window.CUSDIS.renderTo(document.getElementById('cusdis_thread'), {
                    pageId: 'main-page',
                    pageUrl: window.location.href,
                    pageTitle: 'Main Menu'
                });
            }
        }

        // Set initial page URL properties for comments on load
        document.getElementById('cusdis_thread').setAttribute('data-page-url', window.location.href);
    </script>
