<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince of Darkness - Manga Reader</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            width: 100%;
            background-color: #1a1a1a;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #333;
            cursor: pointer;
        }
        
        .socials-bar {
            margin-top: 10px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .socials-bar a {
            color: #ff4500;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .socials-bar a:hover {
            text-decoration: underline;
        }

        .chapter-menu {
            max-width: 600px;
            width: 90%;
            margin: 40px 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .chapter-link {
            background-color: #1a1a1a;
            color: #fff;
            padding: 20px;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid #333;
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chapter-link:hover {
            background-color: #ff4500;
            border-color: #ff4500;
            transform: translateY(-2px);
        }
        .chapter-date {
            font-size: 0.85rem;
            color: #aaa;
            font-weight: normal;
            display: block;
            margin-top: 4px;
        }

        .hidden {
            display: none !important;
        }
        .navigation {
            margin: 20px 0;
        }
        .btn {
            background-color: #ff4500;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 0 10px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
        }
        .btn:hover {
            background-color: #e03e00;
        }
        .manga-container {
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0px;
        }
        .manga-page {
            width: 100%;
            height: auto;
            display: block;
        }
        
        /* Local Comment Section with Interactive Elements */
        .custom-comments {
            max-width: 800px;
            width: 90%;
            margin: 40px auto;
            background-color: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            box-sizing: border-box;
        }
        .custom-comments h3 {
            margin-top: 0;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .comment-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        .comment-form input, .comment-form textarea {
            background-color: #121212;
            border: 1px solid #333;
            color: white;
            padding: 10px;
            border-radius: 4px;
            font-family: Arial, sans-serif;
        }
        .comment-form textarea {
            resize: vertical;
            height: 80px;
        }
        .comment-form button {
            align-self: flex-start;
        }
        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
        }
        .single-comment {
            background-color: #222;
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid #ff4500;
        }
        .comment-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #ff4500;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .comment-time {
            color: #888;
            font-weight: normal;
        }
        
        /* Interaction Row Styling */
        .comment-actions {
            margin-top: 10px;
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
        }
        .action-btn {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .action-btn:hover {
            color: #ff4500;
        }
        .heart-btn.liked {
            color: #ff4500;
        }
        
        /* Nested Reply Form & Thread Elements */
        .reply-form-container {
            margin-top: 10px;
            padding-left: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .reply-form-container input, .reply-form-container textarea {
            background-color: #121212;
            border: 1px solid #444;
            color: white;
            padding: 6px;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        .reply-form-container textarea {
            height: 50px;
            resize: none;
        }
        .replies-container {
            margin-top: 10px;
            padding-left: 20px;
            border-left: 2px dashed #444;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .single-reply {
            background-color: #2a2a2a;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        .reply-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #ff4500;
            font-weight: bold;
            margin-bottom: 4px;
        }

        footer {
            margin: 40px 0;
            text-align: center;
            color: #666;
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>

    <script>
        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyD0g_2GP-dAZsrSNJGFrIK7Y0C2K1ruGv0",
            authDomain: "prince-of-darkness.firebaseapp.com",
            databaseURL: "https://prince-of-darkness-default-rtdb.firebaseio.com",
            projectId: "prince-of-darkness",
            storageBucket: "prince-of-darkness.firebasestorage.app",
            messagingSenderId: "1084924350459",
            appId: "1:1084924350459:web:160b2fc7c6c333b357055e",
            measurementId: "G-VG6WZYEB6D"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let activeChapterId = 'main-page';
        let firebaseListeningRef = null;

        function openChapter(chapterId, chapterTitle) {
            activeChapterId = chapterId;
            document.getElementById('menu-view').classList.add('hidden');
            document.getElementById('reader-view').classList.remove('hidden');
            
            const contents = document.querySelectorAll('.chapter-content');
            contents.forEach(content => content.classList.add('hidden'));
            
            document.getElementById(chapterId).classList.remove('hidden');
            document.getElementById('current-view-title').innerText = chapterTitle;
            
            window.scrollTo({top: 0, behavior: 'smooth'});
            listenToComments();
        }

        function showMenu() {
            if (firebaseListeningRef) {
                firebaseListeningRef.off(); // Turn off listener when leaving page
            }
            activeChapterId = 'main-page';
            document.getElementById('reader-view').classList.add('hidden');
            document.getElementById('menu-view').classList.remove('hidden');
            document.getElementById('current-view-title').innerText = "Chapter Selection";
        }

        // --- Live Global Comments with Firebase ---
        function listenToComments() {
            if (firebaseListeningRef) {
                firebaseListeningRef.off();
            }

            firebaseListeningRef = database.ref('comments/' + activeChapterId);
            
            firebaseListeningRef.on('value', (snapshot) => {
                const data = snapshot.val();
                let commentsArray = [];
                
                if (data) {
                    commentsArray = Object.keys(data).map(key => ({
                        id: key,
                        ...data[key],
                        replies: data[key].replies ? Object.keys(data[key].replies).map(rKey => data[key].replies[rKey]) : []
                    }));
                    commentsArray.sort((a, b) => b.timestamp - a.timestamp);
                }
                
                renderComments(commentsArray);
            });
        }

        function submitComment() {
            const nameInput = document.getElementById('comment-name');
            const textInput = document.getElementById('comment-text');
            
            const name = nameInput.value.trim() || "Anonymous";
            const text = textInput.value.trim();
            
            if (!text) return;

            const newComment = {
                name: name,
                text: text,
                date: new Date().toLocaleDateString(),
                timestamp: Date.now(),
                likes: 0
            };

            database.ref('comments/' + activeChapterId).push(newComment);

            textInput.value = '';
            nameInput.value = '';
        }

        function toggleHeart(commentId) {
            let likedComments = JSON.parse(localStorage.getItem('liked_comments')) || [];
            const commentRef = database.ref(`comments/${activeChapterId}/${commentId}/likes`);

            commentRef.transaction((currentLikes) => {
                let likes = currentLikes || 0;
                if (likedComments.includes(commentId)) {
                    likedComments = likedComments.filter(id => id !== commentId);
                    likes = Math.max(0, likes - 1);
                } else {
                    likedComments.push(commentId);
                    likes += 1;
                }
                localStorage.setItem('liked_comments', JSON.stringify(likedComments));
                return likes;
            });
        }

        function toggleReplyForm(commentId) {
            const formElement = document.getElementById(`reply-form-${commentId}`);
            if (formElement.classList.contains('hidden')) {
                formElement.classList.remove('hidden');
            } else {
                formElement.classList.add('hidden');
            }
        }

        function submitReply(commentId) {
            const nameInput = document.getElementById(`reply-name-${commentId}`);
            const textInput = document.getElementById(`reply-text-${commentId}`);
            
            const name = nameInput.value.trim() || "Anonymous";
            const text = textInput.value.trim();
            
            if (!text) return;

            const newReply = {
                name: name,
                text: text,
                date: new Date().toLocaleDateString(),
                timestamp: Date.now()
            };

            database.ref(`comments/${activeChapterId}/${commentId}/replies`).push(newReply);

            nameInput.value = '';
            textInput.value = '';
        }

        function renderComments(chapterComments) {
            const listContainer = document.getElementById('comments-list');
            listContainer.innerHTML = '';

            let likedComments = JSON.parse(localStorage.getItem('liked_comments')) || [];

            if (chapterComments.length === 0) {
                listContainer.innerHTML = '<p style="color: #666; font-style: italic;">No comments yet. Be the first!</p>';
                return;
            }

            chapterComments.forEach(comment => {
                const commentDiv = document.createElement('div');
                commentDiv.className = 'single-comment';
                
                const isLiked = likedComments.includes(comment.id) ? 'liked' : '';
                
                let repliesHtml = '';
                if(comment.replies && comment.replies.length > 0) {
                    comment.replies.sort((a, b) => a.timestamp - b.timestamp);
                    repliesHtml = `<div class="replies-container">`;
                    comment.replies.forEach(reply => {
                        repliesHtml += `
                            <div class="single-reply">
                                <div class="reply-header">
                                    <span>${escapeHTML(reply.name)}</span>
                                    <span class="comment-time">${reply.date}</span>
                                </div>
                                <div>${escapeHTML(reply.text)}</div>
                            </div>
                        `;
                    });
                    repliesHtml += `</div>`;
                }

                commentDiv.innerHTML = `
                    <div class="comment-header">
                        <span>${escapeHTML(comment.name)}</span>
                        <span class="comment-time">${comment.date}</span>
                    </div>
                    <div>${escapeHTML(comment.text)}</div>
                    
                    <div class="comment-actions">
                        <button class="action-btn heart-btn ${isLiked}" onclick="toggleHeart('${comment.id}')">
                            ❤️ <span>${comment.likes || 0}</span>
                        </button>
                        <button class="action-btn" onclick="toggleReplyForm('${comment.id}')">
                            💬 Reply
                        </button>
                    </div>

                    <div id="reply-form-${comment.id}" class="reply-form-container hidden">
                        <input type="text" id="reply-name-${comment.id}" placeholder="Your Nickname">
                        <textarea id="reply-text-${comment.id}" placeholder="Type a reply..."></textarea>
                        <button class="btn" style="padding: 5px 10px; font-size: 0.8rem;" onclick="submitReply('${comment.id}')">Submit Reply</button>
                    </div>

                    ${repliesHtml}
                `;
                listContainer.appendChild(commentDiv);
            });
        }

        function escapeHTML(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
    </script>
</body>
