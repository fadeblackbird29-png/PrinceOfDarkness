<head>
    <meta charset="UTF-8">

    <title>Prince of Darkness - Manga Reader</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            width: 100%;
            background-color: #1a1a1a;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #333;
            cursor: pointer;
        }
        
        .socials-bar {
            margin-top: 10px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .socials-bar a {
            color: #ff4500;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .socials-bar a:hover {
            text-decoration: underline;
        }

        .chapter-menu {
            max-width: 600px;
            width: 90%;
            margin: 40px 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .chapter-link {
            background-color: #1a1a1a;
            color: #fff;
            padding: 20px;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid #333;
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chapter-link:hover {
            background-color: #ff4500;
            border-color: #ff4500;
            transform: translateY(-2px);
        }
        .chapter-metadata {
            display: flex;
            gap: 15px;
            margin-top: 6px;
        }
        .chapter-date, .chapter-views {
            font-size: 0.85rem;
            color: #aaa;
            font-weight: normal;
        }

        .hidden {
            display: none !important;
        }
        .navigation {
            margin: 20px 0;
        }
        .btn {
            background-color: #ff4500;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 0 10px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
        }
        .btn:hover {
            background-color: #e03e00;
        }
        .manga-container {
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0px;
        }
        .manga-page {
            width: 100%;
            height: auto;
            display: block;
        }
        
        /* Global Live Comment Container Wrapper */
        .custom-comments {
            max-width: 800px;
            width: 90%;
            margin: 40px auto;
            background-color: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            box-sizing: border-box;
        }
        .custom-comments h3 {
            margin-top: 0;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        footer {
            margin: 40px 0;
            text-align: center;
            color: #666;
        }
    </style>
</head>

    <script>
        // --- CONFIGURE YOUR DATABASE AND PATH NAMESPACES ---
        const SITE_NAMESPACE = "prince_of_darkness_manga"; 
        
        // IMPORTANT: Swap this out for your real GitHub repository identifier!
        // Format: "your-github-username/your-repository-name"
        const GITHUB_REPO = "fadeblackbird29-png/PrinceOfDarkness"; 

        // Load visual counter totals when home menu builds
        document.addEventListener("DOMContentLoaded", () => {
            fetchViews('chapter1');
        });

        function openChapter(chapterId, chapterTitle) {
            document.getElementById('menu-view').classList.add('hidden');
            document.getElementById('reader-view').classList.remove('hidden');
            
            const contents = document.querySelectorAll('.chapter-content');
            contents.forEach(content => content.classList.add('hidden'));
            
            document.getElementById(chapterId).classList.remove('hidden');
            document.getElementById('current-view-title').innerText = chapterTitle;
            
            window.scrollTo({top: 0, behavior: 'smooth'});

            incrementViews(chapterId);
            loadGlobalComments(chapterTitle);
        }

        function showMenu() {
            document.getElementById('reader-view').classList.add('hidden');
            document.getElementById('menu-view').classList.remove('hidden');
            document.getElementById('current-view-title').innerText = "Chapter Selection";
            fetchViews('chapter1'); 
        }

        // --- Working Native JavaScript View Counter Engine ---
        function incrementViews(chapterId) {
            fetch(`https://api.moeounter.org/hit/${SITE_NAMESPACE}/${chapterId}`)
                .then(res => res.json())
                .then(data => {
                    if(data && data.views) {
                        document.getElementById(`${chapterId}-views-display`).innerText = `👁️ ${data.views} views`;
                    }
                })
                .catch(err => console.log("Counter handling error."));
        }

        function fetchViews(chapterId) {
            fetch(`https://api.moeounter.org/get/${SITE_NAMESPACE}/${chapterId}`)
                .then(res => res.json())
                .then(data => {
                    if(data && data.views) {
                        document.getElementById(`${chapterId}-views-display`).innerText = `👁️ ${data.views} views`;
                    } else {
                        document.getElementById(`${chapterId}-views-display`).innerText = `👁️ 0 views`;
                    }
                })
                .catch(() => {
                    document.getElementById(`${chapterId}-views-display`).innerText = `👁️ 0 views`;
                });
        }

        // --- Global Serverless Comment Thread Loader ---
        function loadGlobalComments(chapterTitle) {
            const container = document.getElementById('utterances-comment-box');
            container.innerHTML = ''; 
            
            const script = document.createElement('script');
            script.src = 'https://utteranc.es/client.js';
            script.setAttribute('repo', GITHUB_REPO);
            script.setAttribute('issue-term', chapterTitle); 
            script.setAttribute('theme', 'github-dark');
            script.setAttribute('crossorigin', 'anonymous');
            script.async = true;
            
            container.appendChild(script);
        }
    </script>
